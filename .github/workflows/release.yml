name: Release Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Package and publish Electron app
        run: bun run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub release notes
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $release = gh release view $tag --json id 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --notes-file release-notes.md
          } else {
            Write-Host "Release $tag not found. Creating..."
            gh release create $tag --notes-file release-notes.md --title "Shuddhalekhan $version"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
