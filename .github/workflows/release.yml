name: Release Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Check release publish state
        id: release_state
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $releaseJson = gh release view $tag --json isDraft 2>$null
          if ($LASTEXITCODE -ne 0) {
            "tag=$tag" >> $env:GITHUB_OUTPUT
            "should_publish=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag does not exist. Packaging and publishing will run."
            exit 0
          }

          $release = $releaseJson | ConvertFrom-Json
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($release.isDraft) {
            "should_publish=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag exists as a draft. Packaging and publishing will run."
          } else {
            "should_publish=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag is already published. Skipping artifact publish to avoid duplicate release assets."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and publish Electron app
        if: steps.release_state.outputs.should_publish == 'true'
        run: bun run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub release notes
        if: steps.release_state.outputs.should_publish == 'true'
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $release = gh release view $tag --json id 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --notes-file release-notes.md
          } else {
            Write-Host "Release $tag not found. Creating..."
            gh release create $tag --notes-file release-notes.md --title "Shuddhalekhan $version"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
